name: GrADS
category: others
description: |
  GrADS（The Grid Analysis and Display System）是一个用于快速便捷地访问、操作、分析和可视化地球科学数据的工具。GrADS 拥有两种数据模型，可处理网格数据和站点数据，并支持所有标准数据文件格式。GrADS 使用五维数据环境：四个常规维度（经度、纬度、垂直高度和时间）外加一个可选的第五维度（通常用于集合预报）。分析操作通过代数表达式执行，表达式可递归求值以支持嵌套。GrADS 提供丰富的内置函数集，同时用户也可以使用任何编程语言编写外部插件来添加自定义函数。GrADS 具有可编程接口（脚本语言），支持复杂的分析和显示应用，可在交互模式或批处理模式下运行。
environment: |
  本应用在Docker环境中运行，安装Docker执行如下命令
  ```
  yum install -y docker
  ```
tags: |
  GrADS镜像的Tag由其版本信息和基础镜像版本信息组成，详细内容如下

  |    Tag   |  Currently  |   Architectures  |
  |----------|-------------|------------------|
  |[2.2.3-oe2403sp3](https://atomgit.com/openeuler/openeuler-docker-images/blob/master/Others/grads/2.2.3/24.03-lts-sp3/Dockerfile) | GrADS 2.2.3 on openEuler 24.03-lts-sp3 | amd64, arm64 |
  
download: |
  拉取镜像到本地
  ```
  docker pull openeuler/grads:{Tag}
  ```

usage: |
  - 启动 GrADS 交互式会话：
  
    ```
    docker run -it openeuler/grads:{Tag}
    ```
  
  - 在批处理模式下运行 GrADS 脚本：
  
    ```
    docker run --rm -v $(pwd):/data openeuler/grads:{Tag} grads -blc "run /data/script.gs"
    ```

