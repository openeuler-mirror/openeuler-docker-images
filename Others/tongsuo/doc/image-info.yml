name: Tongsuo
category: others
description: 铜锁/Tongsuo是一个提供现代密码学算法和安全通信协议的开源基础密码库，为存储、网络、密钥管理、隐私计算等诸多业务场景提供底层的密码学基础能力，实现数据在传输、使用、存储等过程中的私密性、完整性和可认证性，为数据生命周期中的隐私和安全提供保护能力。
environment: |
  本应用在Docker环境中运行，安装Docker执行如下命令
  ```
  yum install -y docker
  ```
tags: |
  Tongsuo镜像的Tag由其版本信息和基础镜像版本信息组成，详细内容如下

  |    Tag   |  Currently  |   Architectures  |
  |----------|-------------|------------------|
  |[8.4.0-oe2403sp4](https://atomgit.com/openeuler/openeuler-docker-images/blob/master/Others/Tongsuo/8.4.0/24.03-lts-sp4/Dockerfile) | Tongsuo 8.4.0 on openEuler 24.03-LTS-SP4 | amd64, arm64 |
  |[8.4.0-oe2403sp3](https://atomgit.com/openeuler/openeuler-docker-images/blob/master/Others/Tongsuo/8.4.0/24.03-lts-sp3/Dockerfile) | Tongsuo 8.4.0 on openEuler 24.03-LTS-SP3 | amd64, arm64 |

download: |
  拉取镜像到本地
  ```
  docker pull openeuler/tongsuo:{Tag}
  ```

usage: |
  - 查看Tongsuo版本:

    ```
    docker run --rm openeuler/tongsuo:{Tag} tongsuo version
    ```

  - 运行速度基准测试:

    ```
    docker run --rm openeuler/tongsuo:{Tag} tongsuo speed
    ```

  - 以交互式Shell运行容器，使用tongsuo命令行工具:

    ```
    docker run -it --rm openeuler/tongsuo:{Tag} bash
    ```

    在容器内，可使用 `tongsuo` 命令作为 OpenSSL 的替代品，支持 TLS/SSL 连接、证书管理、加解密、摘要计算等操作。例如：

    ```
    tongsuo help
    tongsuo version
    tongsuo speed sm2
    tongsuo speed sm3
    tongsuo speed sm4
    ```

license: Apache-2.0
similar_packages:
  - OpenSSL: 通用密码学库和 TLS/SSL 工具包
  - BoringSSL: Google 维护的 OpenSSL 分支
  - LibreSSL: OpenBSD 维护的 OpenSSL 分支
  - GMSSL: 国密算法开源密码库
dependency:
  - perl-Text-Template

homepage: https://github.com/Tongsuo-Project/Tongsuo
upstream:
  backend: GitHub
  version_url: Tongsuo-Project/Tongsuo
  version_prefix:
  version_filter: alpha;rc;candidate;pre
  version_scheme: RPM
