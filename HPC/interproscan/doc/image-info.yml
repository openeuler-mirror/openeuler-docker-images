name: interproscan
category: HPC
description: InterProScan是基因组规模的蛋白质功能分类工具，由EBI（欧洲生物信息学研究所）开发。InterProScan将多个蛋白质功能预测数据库（包括Pfam、SMART、ProSite、Gene3D等）的扫描算法集成在一起，对用户提交的FASTA格式蛋白质或核酸序列进行功能注释。InterProScan提供序列匹配计算、蛋白质家族归属识别、功能域和位点检测、多种输出格式支持等功能，广泛应用于蛋白质功能注释、基因组分析和生物信息学研究。
environment: |
  本应用在Docker环境中运行,安装Docker执行如下命令
  ```
  yum install -y docker
  ```
tags: |
  interproscan镜像的Tag由其版本信息和基础镜像版本信息组成,详细内容如下
  |    Tag   |  Currently  |   Architectures  |
  |----------|-------------|------------------|
  |[5.77-108.0-oe2403sp3](https://gitee.com/openeuler/openeuler-docker-images/blob/master/HPC/interproscan/5.77-108.0/24.03-lts-sp3/Dockerfile) | InterProScan 5.77-108.0 on openEuler 24.03-LTS-SP3 | amd64, arm64 |
download: |
  拉取镜像到本地
  ```
  docker pull openeuler/interproscan:{Tag}
  ```
usage: |
  - 确保已安装 Docker 环境。
  - 从 DockerHub 获取 InterProScan 镜像:
    ```
    docker pull openeuler/interproscan:{Tag}
    ```
  - 启动容器进入 InterProScan 环境
    ```
    docker run -it openeuler/interproscan:{Tag}
    ```
  - 在容器内验证安装
    ```
    interproscan.sh --version
    ```
license: Apache-2.0
similar_packages:
  - HMMER: 基于profile HMM的蛋白质序列搜索和注释工具
  - Pfam: 蛋白质家族数据库，提供基于HMM的功能域注释
  - BLAST: 基础局部比对搜索工具，用于序列相似性搜索和功能推断
dependency:
  - Java
  - Python
  - Perl
homepage: https://interproscan-docs.readthedocs.io
