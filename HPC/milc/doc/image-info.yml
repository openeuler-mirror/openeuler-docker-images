name: milc
category: hpc
description: MILC是由MILC合作组开发的格点量子色动力学(QCD)计算代码，使用C语言编写，支持MPI和OpenMP并行计算，用于SU(3)格点规范理论的高性能计算研究，广泛应用于格点QCD的各种物理计算场景。
environment: |
  本应用在Docker环境中运行，安装Docker执行如下命令
  ```
  yum install -y docker
  ```
tags: |
  milc镜像的Tag由其版本信息和基础镜像版本信息组成，详细内容如下

  |    Tag   |  Currently  |   Architectures  |
  |----------|-------------|------------------|
  |[1.0.0-oe2403sp3](https://gitee.com/openeuler/openeuler-docker-images/blob/master/HPC/milc/1.0.0/24.03-lts-sp3/Dockerfile) | MILC 1.0.0 on openEuler 24.03-LTS-SP3 | amd64, arm64 |

download: |
  拉取镜像到本地
  ```
  docker pull openeuler/milc:{Tag}
  ```

usage: |
  - 启动容器
    ```
    docker run -it --rm openeuler/milc:{Tag}
    ```
    
  - 运行MILC程序（以su3_rhmd_hisq为例，使用4个MPI进程）
    ```
    cd /opt/milc_qcd/build/ks_imp_rhmc
    mpirun --allow-run-as-root -np 4 ./su3_rhmd_hisq
    ```

  注意：MILC程序运行需要输入参数文件，用户需根据具体物理问题准备相应的输入文件。

license: MIT-style license (with endorsement restriction)
similar_packages:
  - Chroma: 由USQCD合作组开发的格点QCD软件框架，支持多种费米子方案和并行计算。
  - BQCD: Berlin Quantum Chromodynamics程序，用于格点QCD模拟，支持HMC和RHMC算法。

dependency:
  - openmpi
  - cmake
  - gcc

homepage: https://github.com/milc-qcd/milc_qcd
upstream:
  version_url: milc-qcd/milc_qcd
  backend: GitHub
  version_scheme: RPM
  version_prefix:
  version_filter: