name: DeePMD-kit
category: hpc
description: DeePMD-kit是一个基于深度学习的分子动力学模拟开源软件包，提供深度势能分子动力学（DPMD）和深度势能范围修正（DPRc）框架，可以用于分子模拟和材料科学计算。
environment: |
  本应用在Docker环境中运行，安装Docker执行如下命令
  ```
  yum install -y docker
  ```
tags: |
  DeePMD-kit镜像的Tag由其版本信息和基础镜像版本信息组成，详细内容如下

  |    Tag   |  Currently  |   Architectures  |
  |----------|-------------|------------------|
  |[3.1.3-oe2403sp3](https://gitee.com/openeuler/openeuler-docker-images/blob/master/HPC/deepmd-kit/3.1.3/24.03-lts-sp3/Dockerfile)| DeePMD-kit 3.1.3 on openEuler 24.03-LTS-SP3 | amd64, arm64 |

download: |
  拉取镜像到本地
  ```
  docker pull openeuler/deepmd-kit:{Tag}
  ```

usage: |
  拉取镜像（示例）：
  ```
  docker pull openeuler/deepmd-kit:3.1.3-oe2403sp3
  ```

  运行容器并验证版本：
  ```
  docker run -it --rm openeuler/deepmd-kit:3.1.3-oe2403sp2 dp --version
  ```

  训练模型（示例）：
  ```
  docker run -it --rm -v /path/to/data:/data openeuler/deepmd-kit:3.1.3-oe2403sp2 dp train /data/input.json
  ```

  与LAMMPS联合使用：
  DeePMD-kit可与LAMMPS联合进行分子动力学模拟，典型工作流程如下：
  1. 训练深度势能模型
  2. 冻结模型
  3. 在LAMMPS中使用 `pair_style deepmd` 命令调用模型

license: LGPL-3.0 license
similar_packages:
  - name: lammps
    description: LAMMPS是一款开源分子动力学模拟软件，可与DeePMD-kit联合使用。
    homepage: https://lammps.org/
  - name: gromacs
    description: GROMACS是一款高性能分子动力学软件，主要用于生物分子模拟。
    homepage: https://gromacs.org/
dependency:
  - pytorch
  - numpy
  - cmake

homepage: https://github.com/deepmodeling/deepmd-kit
upstream:
  backend: GitHub
  version_url: deepmodeling/deepmd-kit
  version_prefix: v
  version_filter: alpha;rc;candidate
  version_scheme: RPM