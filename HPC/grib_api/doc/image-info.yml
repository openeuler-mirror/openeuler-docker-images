name: grib_api
category: hpc
description: GRIB API 是 ECMWF 开发的 GRIB 第1版和第2版编码/解码软件。
environment: |
  本应用在Docker环境中运行，安装Docker执行如下命令
  ```
  yum install -y docker
  ```
tags: |
  grib_api镜像的Tag由其版本信息和基础镜像版本信息组成，详细内容如下

  |    Tag   |  Currently  |   Architectures  |
  |----------|-------------|------------------|
  |[1.21.0-oe2403sp3](https://atomgit.com/openeuler/openeuler-docker-images/blob/master/HPC/grib_api/1.21.0/24.03-lts-sp3/Dockerfile) | grib_api 1.21.0 on openEuler 24.03-lts-sp3 | amd64, arm64 |
  
download: |
  拉取镜像到本地
  ```
  docker pull openeuler/grib_api:{Tag}
  ```

usage: |
  - 运行容器并使用 grib_api 命令行工具：

    ```
    docker run --rm openeuler/grib_api:{Tag} grib_ls -h
    ```

  - 查看挂载到容器中的 GRIB 文件：

    ```
    docker run --rm -v /path/to/data:/data openeuler/grib_api:{Tag} grib_ls /data/sample.grib
    ```

license: Apache-2.0
similar_packages:
  - ecCodes: 新一代GRIB编码/解码库，grib_api的后继者
  - cfgrib: Python接口的GRIB文件处理库
  - wgrib2: GRIB2格式命令行处理工具

dependency:
  - 

homepage: https://github.com/weathersource/grib_api
upstream:
  backend: GitHub
  version_url: weathersource/grib_api
  version_prefix: v
  version_filter: alpha;rc;candidate;beta;pre
  version_scheme: RPM
