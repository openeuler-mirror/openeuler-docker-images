similar_packages:
  - KMC: 另一个快速的k-mer计数工具，基于磁盘存储实现超大规模k-mer计数
  - DSK: 基于磁盘的k-mer计数算法，适用于内存受限的大规模数据场景
  - BFCounter: 基于Bloom过滤器的k-mer计数工具，适用于低内存场景
dependency:
  - g++
  - make
homepage: https://github.com/gmarcais/Jellyfish
upstream:
