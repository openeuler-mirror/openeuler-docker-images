name: towhee
category: ai
description: Towhee 是一个前沿框架，旨在通过基于大语言模型（LLM）的流水线编排来简化非结构化数据的处理。它能够从多种非结构化数据类型（包括长文本、图像、音频和视频文件）中提取有价值的洞察。利用生成式 AI 和最先进的深度学习模型，Towhee 能够将这些原始数据转换为特定格式，如文本、图像或嵌入向量，然后可以高效地加载到向量数据库等适当的存储系统中。  # 中文描述
environment: |
  本应用在Docker环境中运行，安装Docker执行如下命令
  ```
  yum install -y docker
  ```
tags: |
  towhee镜像的Tag由其版本信息和基础镜像版本信息组成，详细内容如下

  |    Tag   |  Currently  |   Architectures  |
  |----------|-------------|------------------|
  |[1.1.3-oe2403sp3](https://atomgit.com/openeuler/openeuler-docker-images/blob/master/AI/towhee/1.1.3/24.03-lts-sp3/Dockerfile) | towhee 1.1.3 on openEuler 24.03-lts-sp3 | amd64, arm64 |
  
download: |
  拉取镜像到本地
  ```
  docker pull openeuler/towhee:{Tag}
  ```

usage: |
  ## 启动 towhee 实例

  使用以下命令启动 towhee 容器：

  ```
  docker run -it openeuler/towhee:{Tag}
  ```

  更多信息请访问 [Towhee 文档](https://towhee.readthedocs.io/en/latest/)。

license: Apache-2.0
similar_packages:
  - LangChain: LLM 应用开发框架
  - Haystack: NLP 搜索与问答框架
  - LlamaIndex: LLM 数据索引框架
  
dependency:
  - python3

homepage: https://github.com/towhee-io/towhee
upstream:
  backend: GitHub
  version_url: towhee-io/towhee
  version_prefix: 
  version_filter: alpha;rc;candidate
  version_scheme: RPM
