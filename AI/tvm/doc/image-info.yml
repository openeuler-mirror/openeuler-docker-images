name: tvm
category: ai
description: Apache TVM 是一个开源的端到端机器学习编译框架，支持从主流深度学习框架（PyTorch、TensorFlow、ONNX 等）导入模型，并将其编译为可在多种硬件后端上高效运行的最小可部署模块。
environment: |
  本应用在Docker环境中运行，安装Docker执行如下命令
  ```
  yum install -y docker
  ```
tags: |
  tvm镜像的Tag由其版本信息和基础镜像版本信息组成，详细内容如下

  |    Tag   |  Currently  |   Architectures  |
  |----------|-------------|------------------|
  |[0.24.0-oe2403sp4](https://atomgit.com/openeuler/openeuler-docker-images/blob/master/AI/tvm/0.24.0/24.03-lts-sp4/Dockerfile) | tvm 0.24.0 on openEuler 24.03-lts-sp4 | amd64, arm64 |
  |[0.24.0-oe2403sp3](https://atomgit.com/openeuler/openeuler-docker-images/blob/master/AI/tvm/0.24.0/24.03-lts-sp3/Dockerfile) | tvm 0.24.0 on openEuler 24.03-lts-sp3 | amd64, arm64 |

download: |
  拉取镜像到本地
  ```
  docker pull openeuler/tvm:{Tag}
  ```

usage: |
  - 启动容器进入 TVM 开发环境
    ```
    docker run -it openeuler/tvm:{Tag}
    ```

  - 在容器内验证安装
    ```
    python3 -c "import tvm; print(tvm.__file__)"
    ```

license: Apache-2.0
similar_packages:
  - Halide: 图像处理和计算加速的编译器框架，TVM 的 TIR 模块和算术简化源于 Halide
  - Loopy: 整数集合分析和循环变换原语工具
  - Theano: 深度学习框架，其符号化扫描算子的设计启发了 TVM
  - MLIR: 可重用的编译器基础设施，TVM 通过 USE_MLIR 选项集成
  - ONNX Runtime: 跨平台机器学习推理加速器

dependency:
  -

homepage: https://github.com/apache/tvm
upstream:
  backend: GitHub
  version_url: apache/tvm
  version_prefix: v
  version_filter: alpha;rc;candidate
  version_scheme: RPM
