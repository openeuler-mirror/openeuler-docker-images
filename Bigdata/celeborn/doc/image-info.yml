name: celeborn
category: bigdata
description: Apache Celeborn 致力于提高不同 MapReduce 引擎的效率和弹性，为中间数据（包括 Shuffle 数据、溢写数据、结果数据等）提供弹性、高效的管理服务。目前，Celeborn 主要专注于 Shuffle 数据。
environment: |
  本应用在Docker环境中运行，安装Docker执行如下命令
  ```
  yum install -y docker
  ```
tags: |
  celeborn镜像的Tag由其版本信息和基础镜像版本信息组成，详细内容如下

  |    Tag   |  Currently  |   Architectures  |
  |----------|-------------|------------------|
  |[0.6.3-oe2403sp3](https://atomgit.com/openeuler/openeuler-docker-images/blob/master/Bigdata/celeborn/0.6.3/24.03-lts-sp3/Dockerfile) | celeborn 0.6.3 on openEuler 24.03-lts-sp3 | amd64, arm64 |

download: |
  拉取镜像到本地
  ```
  docker pull openeuler/celeborn:{Tag}
  ```

usage: |
  - 启动 Celeborn Master
    ```
    docker run -d \
      --name celeborn-master \
      -p 9097:9097 -p 9098:9098 \
      openeuler/celeborn:{Tag} \
      /opt/celeborn/sbin/start-master.sh
    ```

  - 启动 Celeborn Worker
    ```
    docker run -d \
      --name celeborn-worker \
      -p 9096:9096 \
      openeuler/celeborn:{Tag} \
      /opt/celeborn/sbin/start-worker.sh celeborn://<master-ip>:9097
    ```

license: Apache-2.0
similar_packages:
  - Apache Uniffle: 通用高性能远程 Shuffle 服务
  - ByteDance CloudShuffleService: 通用远程 Shuffle 解决方案
  - Tencent Firestorm: 面向 Spark 和 MapReduce 的远程 Shuffle 服务

dependency:
  -

homepage: https://github.com/apache/celeborn
upstream:
  backend: GitHub
  version_url: apache/celeborn
  version_prefix: v
  version_filter: alpha;rc;candidate;beta;pre
  version_scheme: RPM
