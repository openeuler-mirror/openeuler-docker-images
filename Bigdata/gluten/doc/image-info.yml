similar_packages:
  - name: hadoop
    description: Hadoop是一个开源的分布式计算平台，提供了分布式存储和分布式计算的能力，适用于大规模数据处理和分析。
    homepage: https://hadoop.apache.org/
  - name: spark
    description: Spark是一个快速、通用的大数据处理引擎，提供了内存计算和分布式计算的能力，适用于大规模数据处理和分析。
    homepage: https://spark.apache.org/
