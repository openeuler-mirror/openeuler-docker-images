name: Gluten
category: bigdata
description: Gluten是一个基于Apache Arrow的开源大数据加速引擎，提供了高性能的SQL查询和数据处理能力，适用于大规模数据分析和处理场景。
environment: |
  本应用在Docker环境中运行，安装Docker执行如下命令
  ```
  yum install -y docker
  ```
tags: |
  Gluten镜像的Tag由其版本信息和基础镜像版本信息组成，详细内容如下

  |    Tag   |  Currently  |   Architectures  |
  |----------|-------------|------------------|
  |[1.6.0-oe2403sp3](https://atomgit.com/openeuler/openeuler-docker-images/blob/master/Bigdata/gluten/1.6.0/24.03-lts-sp3/Dockerfile) | Gluten 1.6.0 on openEuler 24.03-LTS-SP3 | amd64, arm64 |
  

download: |
  拉取镜像到本地
  ```
  docker pull openeuler/gluten:{Tag}
  ```

usage: |
  - 镜像内的构建产物位于 `/opt/gluten/dist`：
    ```
    JAR 文件：/opt/gluten/dist/jars
    原生库：/opt/gluten/dist/lib
    ```
  - 列出镜像内的产物：
    ```
    docker run --rm openeuler/gluten:{Tag} bash -c "find /opt/gluten/dist -type f -maxdepth 3 -print"
    ```
  - 将产物提取到宿主机：
    ```
    docker create --name tmp openeuler/gluten:{Tag}
    docker cp tmp:/opt/gluten/dist ./gluten-dist
    docker rm -v tmp
    ```

license: Apache-2.0 license
similar_packages:
  - Hadoop: Hadoop是一个开源的分布式计算平台，提供了分布式存储和分布式计算的能力，适用于大规模数据处理和分析。
  - Spark: Spark是一个快速、通用的大数据处理引擎，提供了内存计算和分布式计算的能力，适用于大规模数据处理和分析。

dependency:
  - openjdk

homepage: https://github.com/apache/gluten
upstream:
  backend: GitHub
  version_url: apache/gluten
  version_prefix: v
  version_filter: alpha;rc;candidate
  version_scheme: RPM