name: ray
category: Bigdata
description: Ray 是一个统一的框架，用于扩展 AI 和 Python 应用程序。Ray 包含一个核心分布式运行时和一组 AI 库，用于简化机器学习计算。提供可扩展的数据集（Data）、分布式训练（Train）、超参数调优（Tune）、强化学习（RLlib）和可编程模型服务（Serve）。
environment: |
  本应用在Docker环境中运行，安装Docker执行如下命令
  ```
  yum install -y docker
  ```
tags: |
  ray镜像的Tag由其版本信息和基础镜像版本信息组成，详细内容如下

  |    Tag   |  Currently  |   Architectures  |
  |----------|-------------|------------------|
  |[2.55.1-oe2403sp3](https://atomgit.com/openeuler/openeuler-docker-images/blob/master/Bigdata/ray/2.55.1/24.03-lts-sp3/Dockerfile) | ray 2.55.1 on openEuler 24.03-lts-sp3 | amd64, arm64 |

download: |
  拉取镜像到本地
  ```
  docker pull openeuler/ray:{Tag}
  ```

usage: |
  - 启动 Ray 头节点
    ```
    docker run -d --name ray-head -p 8265:8265 -p 6379:6379 openeuler/ray:{Tag}
    ```
    用户可根据自身需求选择对应版本的{Tag}、容器启动的选项。`ray-head`启动之后，通过`http://localhost:8265`访问 Ray Dashboard。

  - 启动 Ray 工作节点连接到头节点
    ```
    docker run -d --name ray-worker openeuler/ray:{Tag} ray start --address=<head-node-ip>:6379
    ```

  - 在 Ray 集群上运行 Python 代码
    ```
    docker exec -it ray-head python -c "import ray; ray.init(address='auto'); print(ray.cluster_resources())"
    ```

  - 启动参数

    |    Parameter   |  Description  |
    |----------------|---------------|
    | -p 8265:8265	 | Ray Dashboard 通过 `http://localhost:8265` 提供服务 |
    | -p 6379:6379	 | Ray GCS 服务端口 |
    | -p 10001:10001 | Ray 客户端端口 |
    | -p 8000:8000	 | Ray Serve HTTP 端口 |

  - 容器测试

    查看运行日志
    ```
    docker logs -f ray-head
    ```

    使用 shell 交互
    ```
    docker exec -it ray-head /bin/bash
    ```

license: Apache-2.0
similar_packages:
  - Dask: 一个灵活的 Python 并行计算库，支持从单机扩展到集群环境，适用于大规模数据处理和机器学习工作负载。
  - Apache Spark: 一个统一的大规模数据分析引擎，支持批处理、流处理、机器学习和图计算。
  - Horovod: 一个分布式深度学习训练框架，支持 TensorFlow、PyTorch 等主流框架的高效分布式训练。
  - Modin: 一个与 pandas API 兼容的分布式 DataFrame 库，可无缝扩展数据处理工作负载。

dependency:
  - python3.11

homepage: https://github.com/ray-project/ray
upstream:
  backend: GitHub
  version_url: ray-project/ray
  version_prefix: v
  version_filter: alpha;rc;candidate
  version_scheme: RPM
