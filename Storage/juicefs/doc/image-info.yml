name: juicefs
category: storage
description: JuiceFS 是一个面向云环境的高性能分布式文件系统，构建在对象存储（S3、MinIO、Ceph 等）和元数据引擎（Redis、TiKV、MySQL 等）之上，提供 POSIX 兼容接口。其数据与元数据分离的架构支持弹性扩展、低成本存储和强一致性，适用于云原生工作负载。
environment: |
  本应用在Docker环境中运行，安装Docker执行如下命令
  ```
  yum install -y docker
  ```
tags: |
  juicefs镜像的Tag由其版本信息和基础镜像版本信息组成，详细内容如下

  |    Tag   |  Currently  |   Architectures  |
  |----------|-------------|------------------|
  |[1.3.1-oe2403sp3](https://atomgit.com/openeuler/openeuler-docker-images/blob/master/Storage/juicefs/1.3.1/24.03-lts-sp3/Dockerfile) | JuiceFS 1.3.1 on openEuler 24.03-LTS-SP3 | amd64, arm64 |

download: |
  拉取镜像到本地
  ```
  docker pull openeuler/juicefs:{Tag}
  ```

usage: |
  - 格式化新卷（以 Redis 为元数据引擎、MinIO 为对象存储）

    ```bash
    docker run --rm openeuler/juicefs:{Tag} \
        juicefs format \
        --storage minio \
        --bucket http://minio:9000/mybucket \
        --access-key minioadmin \
        --secret-key minioadmin \
        redis://redis:6379/1 myvol
    ```

  - 挂载卷

    ```bash
    docker run --rm --privileged \
        -v /mnt/juicefs:/mnt/jfs:shared \
        openeuler/juicefs:{Tag} \
        juicefs mount redis://redis:6379/1 /mnt/jfs
    ```

  - 查看版本信息

    ```bash
    docker run --rm openeuler/juicefs:{Tag} juicefs --version
    ```

license: Apache-2.0
similar_packages:
  - CephFS：Ceph 提供的分布式 POSIX 文件系统。
  - GlusterFS：开源分布式文件系统，支持横向扩展。
  - SeaweedFS：轻量级分布式存储系统，支持 FUSE 挂载。
dependency:
  - fuse3

homepage: https://github.com/juicedata/juicefs
upstream:
  backend: GitHub
  version_url: juicedata/juicefs
  version_prefix: v
  version_filter: alpha;rc;candidate;beta;pre;dev
  version_scheme: RPM
